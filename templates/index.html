<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Bridge // HSB2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #141414;
  --panel: #1c1c1c;
  --panel-border: #2a2a2a;
  --panel-inset: #111;
  --amber: #e8a817;
  --amber-dim: #8a6510;
  --amber-glow: #e8a81740;
  --green: #2ecc40;
  --green-dim: #1a7a26;
  --red: #e74c3c;
  --red-dim: #8b2e23;
  --text: #c8c0b0;
  --text-dim: #6b6560;
  --mono: 'Courier New', 'Courier', monospace;
  --sans: 'Segoe UI', 'Helvetica Neue', sans-serif;
}

html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* === SCAN LINE OVERLAY === */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* === HEADER === */
.header {
  background: linear-gradient(180deg, #222 0%, var(--panel) 100%);
  border-bottom: 2px solid var(--amber-dim);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.header-title {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
}

.header h1 {
  font-family: var(--mono);
  font-size: 1.25rem;
  color: var(--amber);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow: 0 0 12px var(--amber-glow);
}

.header .ver {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-dim);
}

/* === STATUS STRIP === */
.status-strip {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.75rem;
}

.stat-label {
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.stat-value {
  color: var(--amber);
  font-weight: 700;
}

/* === MAIN LAYOUT === */
.main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1px;
  background: var(--panel-border);
  min-height: calc(100vh - 60px);
}

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
}

/* === PANEL === */
.panel {
  background: var(--panel);
  padding: 1.25rem;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--panel-border);
}

.panel-title {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.panel-title::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
}

/* === DEBUG MODE TOGGLE === */
.debug-toggle {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.debug-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: color 0.3s;
}

.debug-label.prod { color: var(--green); }
.debug-label.debug { color: var(--red); }

.toggle-track {
  position: relative;
  width: 52px;
  height: 26px;
  background: var(--panel-inset);
  border: 2px solid var(--green-dim);
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.3s;
}

.toggle-track.active {
  border-color: var(--red-dim);
}

.toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  background: var(--green);
  border-radius: 2px;
  transition: all 0.2s;
  box-shadow: 0 0 8px rgba(46,204,64,0.4);
}

.toggle-track.active .toggle-thumb {
  left: 28px;
  background: var(--red);
  box-shadow: 0 0 8px rgba(231,76,60,0.4);
}

.mqtt-topic {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
}

/* === MAPPING TABLE === */
.mapping-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.8rem;
}

.mapping-table thead {
  position: sticky;
  top: 0;
  z-index: 10;
}

.mapping-table th {
  background: var(--panel-inset);
  color: var(--text-dim);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.5rem 0.6rem;
  text-align: left;
  border-bottom: 1px solid var(--panel-border);
  font-weight: 600;
}

.mapping-table td {
  padding: 0.4rem 0.6rem;
  border-bottom: 1px solid var(--panel-border);
  vertical-align: middle;
}

.mapping-table tr:hover td {
  background: #1f1f1f;
}

.mapping-table .scancode {
  color: var(--amber);
  font-weight: 700;
}

.mapping-table .command {
  color: var(--text);
}

.mapping-table .ircc {
  color: var(--text-dim);
  font-size: 0.7rem;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.group-tag {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  border-radius: 2px;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: 1px solid;
}

.group-tag.numbers { color: #5dade2; border-color: #5dade233; }
.group-tag.navigation { color: #af7ac5; border-color: #af7ac533; }
.group-tag.volume { color: var(--green); border-color: #2ecc4033; }
.group-tag.media { color: #f39c12; border-color: #f39c1233; }
.group-tag.system { color: var(--red); border-color: #e74c3c33; }
.group-tag.color { color: #1abc9c; border-color: #1abc9c33; }
.group-tag.channel { color: #e67e22; border-color: #e67e2233; }

.btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.3rem 0.6rem;
  border: 1px solid var(--panel-border);
  background: var(--panel-inset);
  color: var(--text-dim);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}

.btn:hover {
  border-color: var(--amber-dim);
  color: var(--amber);
}

.btn-delete:hover {
  border-color: var(--red-dim);
  color: var(--red);
}

.btn-save {
  border-color: var(--green-dim);
  color: var(--green-dim);
}

.btn-save:hover {
  border-color: var(--green);
  color: var(--green);
}

.table-scroll {
  overflow-y: auto;
  max-height: calc(100vh - 250px);
}

/* === EDIT ROW === */
.edit-input {
  background: var(--panel-inset);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.25rem 0.4rem;
  width: 100%;
}

.edit-input:focus {
  outline: none;
  border-color: var(--amber-dim);
}

.edit-input::placeholder {
  color: var(--text-dim);
}

.add-row td {
  padding: 0.5rem 0.6rem;
  border-top: 2px solid var(--amber-dim);
}

/* === LIVE FEED === */
.feed {
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
  max-height: calc(100vh - 200px);
}

.feed-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.5rem;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--panel-border);
  font-family: var(--mono);
  font-size: 0.75rem;
  animation: feed-in 0.3s ease-out;
}

@keyframes feed-in {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.feed-time {
  color: var(--text-dim);
  font-size: 0.65rem;
  white-space: nowrap;
}

.feed-code {
  color: var(--amber);
  font-weight: 700;
}

.feed-command {
  color: var(--text);
}

.feed-command.unmapped {
  color: var(--text-dim);
  font-style: italic;
}

.feed-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.feed-dot.mapped {
  background: var(--green);
  box-shadow: 0 0 6px rgba(46,204,64,0.5);
}

.feed-dot.unmapped {
  background: var(--red);
  box-shadow: 0 0 6px rgba(231,76,60,0.5);
}

.feed-empty {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.75rem;
  text-align: center;
  padding: 2rem;
  opacity: 0.5;
}

/* === SIDEBAR === */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--panel-border);
}

.sidebar .panel { flex: 1; }

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.6rem 1rem;
  background: var(--panel);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  z-index: 100;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.error {
  border-color: var(--red-dim);
  color: var(--red);
}

/* === RESPONSIVE === */
@media (max-width: 900px) {
  .main { min-height: auto; }
  .table-scroll { max-height: 60vh; }
  .feed { max-height: 40vh; }
  .header { padding: 0.75rem 1rem; }
  .status-strip { gap: 0.75rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-title">
    <h1>IR Bridge</h1>
    <span class="ver">v{{ version }} // hsb2</span>
  </div>
  <div class="status-strip" id="statusStrip">
    <div class="stat">
      <span class="stat-label">Keys</span>
      <span class="stat-value" id="statKeys">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Sent</span>
      <span class="stat-value" id="statSent">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Errors</span>
      <span class="stat-value" id="statErrors">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Uptime</span>
      <span class="stat-value" id="statUptime">--</span>
    </div>
  </div>
</header>

<div class="main">

  <!-- LEFT: MAPPING TABLE -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Scancode Mappings</div>
      <div style="display:flex;gap:0.5rem">
        <span style="font-family:var(--mono);font-size:0.7rem;color:var(--text-dim)" id="mappingCount"></span>
      </div>
    </div>
    <div class="table-scroll">
      <table class="mapping-table">
        <thead>
          <tr>
            <th>Scancode</th>
            <th>Command</th>
            <th>IRCC Code</th>
            <th>Group</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="mappingBody"></tbody>
        <tfoot>
          <tr class="add-row">
            <td><input class="edit-input" id="addScancode" placeholder="0x7001e"></td>
            <td><input class="edit-input" id="addCommand" placeholder="command"></td>
            <td><input class="edit-input" id="addIrcc" placeholder="AAAA...Aw=="></td>
            <td>
              <select class="edit-input" id="addGroup">
                <option value="numbers">numbers</option>
                <option value="navigation">navigation</option>
                <option value="volume">volume</option>
                <option value="media">media</option>
                <option value="system" selected>system</option>
                <option value="color">color</option>
                <option value="channel">channel</option>
              </select>
            </td>
            <td><button class="btn btn-save" onclick="addMapping()">Add</button></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar">

    <!-- DEBUG MODE -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">MQTT Mode</div>
      </div>
      <div class="debug-toggle">
        <span class="debug-label prod" id="labelProd">PROD</span>
        <div class="toggle-track" id="debugToggle" onclick="toggleDebug()">
          <div class="toggle-thumb"></div>
        </div>
        <span class="debug-label debug" id="labelDebug">DEBUG</span>
      </div>
      <div class="mqtt-topic" id="mqttTopic">{{ mqtt_topic }}</div>
    </div>

    <!-- LIVE FEED -->
    <div class="panel" style="flex:3">
      <div class="panel-header">
        <div class="panel-title">Live Events</div>
        <button class="btn" onclick="clearFeed()">Clear</button>
      </div>
      <div class="feed" id="liveFeed">
        <div class="feed-empty">Waiting for key events...</div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var mappings = {{ mappings_json|safe }};
var debugMode = {{ debug_mode|safe }};
var feedItems = [];
var MAX_FEED = 50;

// --- Init ---
function init() {
  renderMappings();
  updateDebugUI();
  pollEvents();
  pollStatus();
  setInterval(pollEvents, 1500);
  setInterval(pollStatus, 10000);
}

// --- Mappings ---
function renderMappings() {
  var body = document.getElementById('mappingBody');
  var keys = Object.keys(mappings);
  var groups = ['numbers','navigation','volume','media','system','color','channel'];
  keys.sort(function(a,b) {
    var ga = groups.indexOf(mappings[a].group);
    var gb = groups.indexOf(mappings[b].group);
    if (ga !== gb) return ga - gb;
    return a.localeCompare(b);
  });

  body.innerHTML = keys.map(function(sc) {
    var m = mappings[sc];
    return '<tr data-sc="'+sc+'">'
      + '<td class="scancode">'+sc+'</td>'
      + '<td class="command">'+m.command+'</td>'
      + '<td class="ircc" title="'+m.ircc+'">'+m.ircc+'</td>'
      + '<td><span class="group-tag '+m.group+'">'+m.group+'</span></td>'
      + '<td><button class="btn btn-delete" onclick="deleteMapping(\''+sc+'\')">Del</button></td>'
      + '</tr>';
  }).join('');

  document.getElementById('mappingCount').textContent = keys.length + ' mapped';
}

function addMapping() {
  var sc = document.getElementById('addScancode').value.trim();
  var cmd = document.getElementById('addCommand').value.trim();
  var ircc = document.getElementById('addIrcc').value.trim();
  var group = document.getElementById('addGroup').value;

  if (!sc || !cmd || !ircc) { toast('All fields required', true); return; }

  mappings[sc] = { command: cmd, ircc: ircc, group: group };
  saveMappings();
  document.getElementById('addScancode').value = '';
  document.getElementById('addCommand').value = '';
  document.getElementById('addIrcc').value = '';
}

function deleteMapping(sc) {
  delete mappings[sc];
  saveMappings();
}

function saveMappings() {
  fetch('/api/mappings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(mappings)
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) { toast('Mappings saved'); renderMappings(); }
      else { toast('Save failed: ' + d.error, true); }
    })
    .catch(function(e) { toast('Save failed', true); });
}

// --- Debug Mode ---
function toggleDebug() {
  debugMode = !debugMode;
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ debug_mode: debugMode })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        document.getElementById('mqttTopic').textContent = d.mqtt_topic;
        toast(debugMode ? 'Debug mode ON' : 'Production mode');
      }
    })
    .catch(function(e) { toast('Toggle failed', true); });
  updateDebugUI();
}

function updateDebugUI() {
  var track = document.getElementById('debugToggle');
  var lp = document.getElementById('labelProd');
  var ld = document.getElementById('labelDebug');
  if (debugMode) {
    track.classList.add('active');
    lp.style.opacity = '0.3';
    ld.style.opacity = '1';
  } else {
    track.classList.remove('active');
    lp.style.opacity = '1';
    ld.style.opacity = '0.3';
  }
}

// --- Live Feed ---
function pollEvents() {
  fetch('/api/events')
    .then(function(r) { return r.json(); })
    .then(function(events) {
      if (!events.length) return;
      var feed = document.getElementById('liveFeed');
      var empty = feed.querySelector('.feed-empty');
      if (empty) empty.remove();

      events.forEach(function(ev) {
        var exists = feedItems.some(function(f) { return f.ts === ev.timestamp; });
        if (exists) return;

        feedItems.unshift({ ts: ev.timestamp });
        if (feedItems.length > MAX_FEED) feedItems.pop();

        var t = ev.timestamp.split('T')[1].split('.')[0];
        var sc = ev.key.key_code_hex;
        var cmd = ev.key.command || 'unmapped';
        var mapped = ev.key.mapped;

        var el = document.createElement('div');
        el.className = 'feed-item';
        el.innerHTML = '<span class="feed-time">' + t + '</span>'
          + '<span><span class="feed-code">' + sc + '</span> '
          + '<span class="feed-command' + (mapped ? '' : ' unmapped') + '">' + cmd + '</span></span>'
          + '<span class="feed-dot ' + (mapped ? 'mapped' : 'unmapped') + '"></span>';
        feed.insertBefore(el, feed.firstChild);

        while (feed.children.length > MAX_FEED) {
          feed.removeChild(feed.lastChild);
        }
      });
    })
    .catch(function(){});
}

// --- Status ---
function pollStatus() {
  fetch('/api/status')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      document.getElementById('statKeys').textContent = s.keys_pressed || 0;
      document.getElementById('statSent').textContent = s.commands_sent || 0;
      document.getElementById('statErrors').textContent = s.errors || 0;
      if (s.started_at) {
        var ms = Date.now() - new Date(s.started_at).getTime();
        var h = Math.floor(ms / 3600000);
        var m = Math.floor((ms % 3600000) / 60000);
        document.getElementById('statUptime').textContent = h + 'h ' + m + 'm';
      }
    })
    .catch(function(){});
}

// --- Toast ---
function toast(msg, err) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' error' : '');
  setTimeout(function() { el.className = 'toast'; }, 2500);
}

function clearFeed() {
  feedItems = [];
  var feed = document.getElementById('liveFeed');
  feed.innerHTML = '<div class="feed-empty">Waiting for key events...</div>';
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Bridge // HSB2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #141414;
  --panel: #1c1c1c;
  --panel-border: #2a2a2a;
  --panel-inset: #111;
  --amber: #e8a817;
  --amber-dim: #8a6510;
  --amber-glow: #e8a81740;
  --green: #2ecc40;
  --green-dim: #1a7a26;
  --red: #e74c3c;
  --red-dim: #8b2e23;
  --blue: #3498db;
  --text: #c8c0b0;
  --text-dim: #6b6560;
  --highlight: #e8a81712;
  --mono: 'Courier New', 'Courier', monospace;
  --sans: 'Segoe UI', 'Helvetica Neue', sans-serif;
}

html, body {
  font-size: 18px;
  height: 100vh;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* === SCROLLBARS === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--panel-inset); }
::-webkit-scrollbar-thumb { background: var(--amber-dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--amber); }
* { scrollbar-width: thin; scrollbar-color: var(--amber-dim) var(--panel-inset); }

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px);
  pointer-events: none;
  z-index: 9999;
}

/* === HEADER === */
.header {
  background: linear-gradient(180deg, #222 0%, var(--panel) 100%);
  border-bottom: 2px solid var(--amber-dim);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.header h1 {
  font-family: var(--mono);
  font-size: 1.3rem;
  color: var(--amber);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow: 0 0 12px var(--amber-glow);
}

.header .ver {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-left: 0.75rem;
}

.status-strip {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.8rem;
}

.stat-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { color: var(--amber); font-weight: 700; }

/* === LAYOUT === */
.main {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 1px;
  background: var(--panel-border);
  flex: 1;
  overflow: hidden;
}
@media (max-width: 960px) { .main { grid-template-columns: 1fr; overflow: auto; } }

.panel {
  background: var(--panel);
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--panel-border);
  gap: 0.75rem;
  flex-shrink: 0;
}

.panel-title {
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  white-space: nowrap;
}

.panel-title::before {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
}

/* === SEARCH === */
.search-bar {
  flex: 1;
  max-width: 280px;
}

.search-input {
  width: 100%;
  background: var(--panel-inset);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 0.4rem 0.7rem;
  border-radius: 3px;
}

.search-input:focus { outline: none; border-color: var(--amber-dim); }
.search-input::placeholder { color: var(--text-dim); }

/* === ADD FORM === */
.add-form {
  display: grid;
  grid-template-columns: 120px 1fr 1fr auto auto;
  gap: 0.5rem;
  align-items: center;
  padding: 0.6rem 0;
  border-bottom: 2px solid var(--amber-dim);
  margin-bottom: 0.5rem;
  flex-shrink: 0;
}

.add-form .edit-input { border-color: var(--panel-border); }
.add-form .edit-input:focus { border-color: var(--amber-dim); }

/* === TABLE === */
.table-scroll {
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}

.mapping-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.9rem;
}

.mapping-table thead { position: sticky; top: 0; z-index: 10; }

.mapping-table th {
  background: var(--panel-inset);
  color: var(--text-dim);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.6rem 0.7rem;
  text-align: left;
  border-bottom: 1px solid var(--panel-border);
  font-weight: 600;
}

.mapping-table td {
  padding: 0.45rem 0.7rem;
  border-bottom: 1px solid var(--panel-border);
  vertical-align: middle;
}

.mapping-table tr { transition: background 0.3s; }
.mapping-table tr:hover td { background: #1f1f1f; }

/* Row highlight on key press */
.mapping-table tr.active-pulse td {
  background: var(--amber-glow) !important;
  transition: background 0s;
}

.mapping-table .scancode { color: var(--amber); font-weight: 700; }
.mapping-table .command { color: var(--text); }

.mapping-table .ircc {
  color: var(--text-dim);
  font-size: 0.75rem;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.group-tag {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: 1px solid;
}

.group-tag.numbers { color: #5dade2; border-color: #5dade233; }
.group-tag.navigation { color: #af7ac5; border-color: #af7ac533; }
.group-tag.volume { color: var(--green); border-color: #2ecc4033; }
.group-tag.media { color: #f39c12; border-color: #f39c1233; }
.group-tag.system { color: var(--red); border-color: #e74c3c33; }
.group-tag.color { color: #1abc9c; border-color: #1abc9c33; }
.group-tag.channel { color: #e67e22; border-color: #e67e2233; }

/* === EDITABLE CELLS === */
.editable {
  cursor: pointer;
  border-bottom: 1px dashed var(--panel-border);
  padding-bottom: 1px;
}
.editable:hover { border-bottom-color: var(--amber-dim); }

.edit-input {
  background: var(--panel-inset);
  border: 1px solid var(--amber-dim);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 0.3rem 0.5rem;
  width: 100%;
}
.edit-input:focus { outline: none; border-color: var(--amber); }
.edit-input::placeholder { color: var(--text-dim); }

.edit-select {
  background: var(--panel-inset);
  border: 1px solid var(--amber-dim);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 0.25rem;
}

/* === BUTTONS === */
.btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.35rem 0.65rem;
  border: 1px solid var(--panel-border);
  background: var(--panel-inset);
  color: var(--text-dim);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--amber-dim); color: var(--amber); }

.btn-delete { color: var(--red-dim); }
.btn-delete:hover { border-color: var(--red-dim); color: var(--red); }

.btn-save { border-color: var(--green-dim); color: var(--green-dim); }
.btn-save:hover { border-color: var(--green); color: var(--green); }

.btn-test { border-color: var(--blue); color: var(--blue); opacity: 0.6; }
.btn-test:hover { opacity: 1; }

.btn-adopt { border-color: var(--green-dim); color: var(--green); font-size: 0.85rem; padding: 0.2rem 0.5rem; }
.btn-adopt:hover { background: var(--green-dim); color: #fff; }

.btn-group { display: flex; gap: 0.35rem; }

/* === ADD ROW === */
.add-row td {
  padding: 0.6rem 0.7rem;
  border-top: 2px solid var(--amber-dim);
  background: var(--panel-inset);
}

.add-row .edit-input { border-color: var(--panel-border); }
.add-row .edit-input:focus { border-color: var(--amber-dim); }

/* === DEBUG TOGGLE === */
.debug-toggle {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.debug-label {
  font-family: var(--mono);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: opacity 0.3s;
}

.toggle-track {
  position: relative;
  width: 56px;
  height: 28px;
  background: var(--panel-inset);
  border: 2px solid var(--green-dim);
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.3s;
}
.toggle-track.active { border-color: var(--red-dim); }

.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  background: var(--green);
  border-radius: 2px;
  transition: all 0.2s;
  box-shadow: 0 0 8px rgba(46,204,64,0.4);
}
.toggle-track.active .toggle-thumb {
  left: 30px;
  background: var(--red);
  box-shadow: 0 0 8px rgba(231,76,60,0.4);
}

.mqtt-topic {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.35rem;
}

/* === LIVE FEED === */
.feed {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}

.feed-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.4rem;
  align-items: center;
  padding: 0.55rem 0;
  border-bottom: 1px solid var(--panel-border);
  font-family: var(--mono);
  font-size: 0.85rem;
  animation: feed-in 0.3s ease-out;
}

@keyframes feed-in {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.feed-left {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-width: 0;
}

.feed-right {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.feed-time {
  color: var(--text-dim);
  font-size: 0.7rem;
  white-space: nowrap;
}

.feed-code { color: var(--amber); font-weight: 700; }

.feed-command {
  color: var(--text);
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.feed-command:hover { color: var(--amber); text-decoration: underline; }
.feed-command.unmapped {
  color: var(--text-dim);
  font-style: italic;
  cursor: default;
}
.feed-command.unmapped:hover { color: var(--text-dim); text-decoration: none; }

.feed-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.feed-dot.mapped { background: var(--green); box-shadow: 0 0 6px rgba(46,204,64,0.5); }
.feed-dot.unmapped { background: var(--red); box-shadow: 0 0 6px rgba(231,76,60,0.5); }

.feed-empty {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.85rem;
  text-align: center;
  padding: 2rem;
}

/* === SIDEBAR === */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--panel-border);
  min-height: 0;
}
.sidebar .panel:first-child { flex-shrink: 0; }
.sidebar .panel:last-child { flex: 1; min-height: 0; }

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 1.5rem; right: 1.5rem;
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 0.7rem 1.2rem;
  background: var(--panel);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--red-dim); color: var(--red); }
.toast.success { border-color: var(--green-dim); color: var(--green); }

/* === CONFIRM DIALOG === */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.confirm-box {
  background: var(--panel);
  border: 2px solid var(--amber-dim);
  padding: 1.5rem;
  min-width: 320px;
  font-family: var(--mono);
}
.confirm-box p {
  font-size: 0.95rem;
  margin-bottom: 1rem;
  color: var(--text);
}
.confirm-box .btn-group {
  justify-content: flex-end;
}

/* === DUPE WARNING === */
.dupe-warn {
  color: var(--red);
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.3rem 0;
}

/* === SETTINGS PANEL === */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}

.setting-item {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.setting-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.setting-input {
  background: var(--panel-inset);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 0.35rem 0.5rem;
  width: 100%;
}
.setting-input:focus { outline: none; border-color: var(--amber-dim); }

.debounce-val {
  color: var(--text-dim);
  font-size: 0.75rem;
  text-align: center;
}
.debounce-val.custom { color: var(--amber); }

.action-tag {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  border-radius: 2px;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: 1px solid;
  cursor: pointer;
}
.action-tag.direct { color: var(--amber); border-color: var(--amber-dim); }
.action-tag.mqtt { color: var(--blue); border-color: #3498db44; }
.action-tag.disabled { color: var(--text-dim); border-color: var(--panel-border); }

.notes-text {
  color: var(--text-dim);
  font-size: 0.7rem;
  font-style: italic;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}
.notes-text:hover { color: var(--text); }
.notes-text.empty { opacity: 0.3; }

.ha-results {
  font-family: var(--mono);
  font-size: 0.75rem;
  margin-top: 0.5rem;
  max-height: 120px;
  overflow-y: auto;
}
.ha-result {
  padding: 0.3rem 0;
  border-bottom: 1px solid var(--panel-border);
  color: var(--text);
}
.ha-result .ha-name { color: var(--blue); }
.ha-result .ha-state { color: var(--green); font-size: 0.65rem; }

/* === RESPONSIVE === */
@media (max-width: 960px) {
  .main { min-height: 100vh; }
}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:baseline">
    <h1>IR Bridge</h1>
    <span class="ver">v{{ version }} // hsb2</span>
  </div>
  <div class="status-strip" id="statusStrip">
    <div class="stat"><span class="stat-label">Keys</span><span class="stat-value" id="statKeys">--</span></div>
    <div class="stat"><span class="stat-label">Sent</span><span class="stat-value" id="statSent">--</span></div>
    <div class="stat"><span class="stat-label">Errors</span><span class="stat-value" id="statErrors">--</span></div>
    <div class="stat"><span class="stat-label">Uptime</span><span class="stat-value" id="statUptime">--</span></div>
  </div>
</header>

<div class="main">

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Mappings</div>
      <div class="search-bar">
        <input class="search-input" id="searchInput" placeholder="Filter..." oninput="renderMappings()">
      </div>
      <span style="font-family:var(--mono);font-size:0.75rem;color:var(--text-dim)" id="mappingCount"></span>
    </div>
    <div class="add-form" style="grid-template-columns: 100px 1fr 1fr auto 55px auto 1fr auto">
      <input class="edit-input" id="addScancode" placeholder="0x7001e" oninput="checkDupe()">
      <input class="edit-input" id="addCommand" placeholder="command">
      <input class="edit-input" id="addIrcc" placeholder="IRCC code">
      <select class="edit-select" id="addGroup">
        <option value="numbers">numbers</option>
        <option value="navigation">navigation</option>
        <option value="volume">volume</option>
        <option value="media">media</option>
        <option value="system" selected>system</option>
        <option value="color">color</option>
        <option value="channel">channel</option>
      </select>
      <input class="edit-input" id="addDebounce" placeholder="ms" title="Debounce">
      <select class="edit-select" id="addAction">
        <option value="direct">direct</option>
        <option value="mqtt">mqtt</option>
        <option value="disabled">disabled</option>
      </select>
      <input class="edit-input" id="addNotes" placeholder="notes (optional)">
      <div class="btn-group">
        <button class="btn" id="btnLastInput" onclick="useLastInput()" title="Use last unmapped scancode" style="display:none">Last</button>
        <button class="btn btn-save" onclick="addMapping()">Add</button>
      </div>
    </div>
    <div class="dupe-warn" id="dupeWarn" style="display:none"></div>
    <div class="table-scroll" id="tableScroll">
      <table class="mapping-table">
        <thead>
          <tr>
            <th>Scancode</th>
            <th>Command</th>
            <th>IRCC Code</th>
            <th>Group</th>
            <th style="text-align:center">Db</th>
            <th>Action</th>
            <th>Notes</th>
            <th style="text-align:right"></th>
          </tr>
        </thead>
        <tbody id="mappingBody"></tbody>
      </table>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">MQTT Mode</div>
      </div>
      <div class="debug-toggle">
        <span class="debug-label" id="labelProd" style="color:var(--green)">PROD</span>
        <div class="toggle-track" id="debugToggle" onclick="toggleDebug()">
          <div class="toggle-thumb"></div>
        </div>
        <span class="debug-label" id="labelDebug" style="color:var(--red);opacity:0.3">DEBUG</span>
      </div>
      <div class="mqtt-topic" id="mqttTopic">{{ mqtt_topic }}</div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Settings</div>
        <div class="btn-group">
          <button class="btn" onclick="loadSettings()">Load</button>
          <button class="btn btn-save" onclick="saveSettings()">Save</button>
        </div>
      </div>
      <div class="settings-grid">
        <div class="setting-item">
          <span class="setting-label">Debounce (ms)</span>
          <input class="setting-input" id="setDebounce" type="number" min="0" step="50">
        </div>
        <div class="setting-item">
          <span class="setting-label">Hold Throttle (ms)</span>
          <input class="setting-input" id="setHoldThrottle" type="number" min="0" step="50">
        </div>
        <div class="setting-item">
          <span class="setting-label">Retry Count</span>
          <input class="setting-input" id="setRetryCount" type="number" min="0" max="10">
        </div>
        <div class="setting-item">
          <span class="setting-label">Retry Delay (ms)</span>
          <input class="setting-input" id="setRetryDelay" type="number" min="0" step="100">
        </div>
        <div class="setting-item" style="grid-column: span 2">
          <span class="setting-label">Log Level</span>
          <select class="setting-input" id="setLogLevel">
            <option value="DEBUG">DEBUG</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
          </select>
        </div>
        <div class="setting-item" style="grid-column: span 2">
          <span class="setting-label">HA URL</span>
          <input class="setting-input" id="setHaUrl" placeholder="http://192.168.1.x:8123">
        </div>
        <div class="setting-item" style="grid-column: span 2">
          <span class="setting-label">HA Token</span>
          <input class="setting-input" id="setHaToken" type="password" placeholder="Long-lived access token">
        </div>
        <div style="grid-column: span 2; margin-top: 0.25rem">
          <button class="btn" onclick="scanHA()" style="width:100%">Scan HA Automations</button>
        </div>
        <div class="ha-results" id="haResults" style="grid-column: span 2"></div>
      </div>
    </div>

    <div class="panel" style="flex:3">
      <div class="panel-header">
        <div class="panel-title">Live Events</div>
        <button class="btn" onclick="clearFeed()">Clear</button>
      </div>
      <div class="feed" id="liveFeed">
        <div class="feed-empty">Waiting for key events...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="confirmContainer"></div>

<script>
var mappings = {{ mappings_json|safe }};
var debugMode = {{ debug_mode|safe }};
var feedItems = [];
var lastUnmappedScancode = null;
var lastPollTs = '';
var MAX_FEED = 50;
var GROUPS = ['numbers','navigation','volume','media','system','color','channel'];

function init() {
  renderMappings();
  updateDebugUI();
  loadSettings();
  pollEvents();
  pollStatus();
  setInterval(pollEvents, 1200);
  setInterval(pollStatus, 10000);

  // Auto-save settings on change
  ['setDebounce','setHoldThrottle','setRetryCount','setRetryDelay','setLogLevel','setHaUrl','setHaToken'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('change', saveSettings);
  });
}

// ===================== MAPPINGS TABLE =====================

function renderMappings() {
  var body = document.getElementById('mappingBody');
  var filter = document.getElementById('searchInput').value.toLowerCase();
  var keys = Object.keys(mappings);

  keys.sort(function(a,b) {
    var ga = GROUPS.indexOf(mappings[a].group);
    var gb = GROUPS.indexOf(mappings[b].group);
    if (ga !== gb) return ga - gb;
    return mappings[a].command.localeCompare(mappings[b].command);
  });

  var shown = 0;
  body.innerHTML = keys.map(function(sc) {
    var m = mappings[sc];
    var text = sc + ' ' + m.command + ' ' + m.group;
    if (filter && text.toLowerCase().indexOf(filter) === -1) return '';
    shown++;
    var db = m.debounce_ms;
    var dbText = db ? db : '—';
    var dbClass = db ? 'debounce-val custom editable' : 'debounce-val editable';
    var act = m.action || 'direct';
    var notes = m.notes || '';
    var notesClass = notes ? 'notes-text editable' : 'notes-text empty editable';
    return '<tr id="row-' + sc.replace('0x','') + '" data-sc="' + sc + '">'
      + '<td class="scancode">' + sc + '</td>'
      + '<td><span class="command editable" onclick="editCell(this,\'' + sc + '\',\'command\')">' + m.command + '</span></td>'
      + '<td><span class="ircc editable" onclick="editCell(this,\'' + sc + '\',\'ircc\')" title="' + m.ircc + '">' + m.ircc + '</span></td>'
      + '<td><span class="editable" onclick="editGroup(this,\'' + sc + '\')"><span class="group-tag ' + m.group + '">' + m.group + '</span></span></td>'
      + '<td style="text-align:center"><span class="' + dbClass + '" onclick="editDebounce(this,\'' + sc + '\')">' + dbText + '</span></td>'
      + '<td><span class="action-tag ' + act + '" onclick="editAction(this,\'' + sc + '\')">' + act + '</span></td>'
      + '<td><span class="' + notesClass + '" onclick="editCell(this,\'' + sc + '\',\'notes\')" title="' + notes + '">' + (notes || '+') + '</span></td>'
      + '<td style="text-align:right"><div class="btn-group" style="justify-content:flex-end">'
      + '<button class="btn btn-test" onclick="testMapping(\'' + sc + '\')" title="Send to TV">Test</button>'
      + '<button class="btn btn-delete" onclick="confirmDelete(\'' + sc + '\')">Del</button>'
      + '</div></td>'
      + '</tr>';
  }).join('');

  document.getElementById('mappingCount').textContent = shown + '/' + keys.length;
}

// ===================== INLINE EDIT =====================

function editCell(el, sc, field) {
  if (el.querySelector('input')) return;
  var current = mappings[sc][field];
  var w = el.offsetWidth;
  el.innerHTML = '<input class="edit-input" value="' + current + '" style="width:' + Math.max(w, 80) + 'px">';
  var inp = el.querySelector('input');
  inp.focus();
  inp.select();

  function save() {
    var val = inp.value.trim();
    if (val && val !== current) {
      mappings[sc][field] = val;
      saveMappings(function() { renderMappings(); });
    } else {
      renderMappings();
    }
  }
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') renderMappings();
  });
}

function editGroup(el, sc) {
  if (el.querySelector('select')) return;
  var current = mappings[sc].group;
  var opts = GROUPS.map(function(g) {
    return '<option value="' + g + '"' + (g === current ? ' selected' : '') + '>' + g + '</option>';
  }).join('');
  el.innerHTML = '<select class="edit-select">' + opts + '</select>';
  var sel = el.querySelector('select');
  sel.focus();

  function save() {
    var val = sel.value;
    if (val !== current) {
      mappings[sc].group = val;
      saveMappings(function() { renderMappings(); });
    } else {
      renderMappings();
    }
  }
  sel.addEventListener('change', save);
  sel.addEventListener('blur', save);
}

function editDebounce(el, sc) {
  if (el.querySelector('input')) return;
  var current = mappings[sc].debounce_ms || '';
  el.innerHTML = '<input class="edit-input" type="number" min="0" step="50" value="' + current + '" placeholder="ms" style="width:70px;text-align:center">';
  var inp = el.querySelector('input');
  inp.focus();
  inp.select();

  function save() {
    var val = parseInt(inp.value);
    if (val > 0) {
      mappings[sc].debounce_ms = val;
    } else {
      delete mappings[sc].debounce_ms;
    }
    saveMappings(function() { renderMappings(); });
  }
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') renderMappings();
  });
}

function editAction(el, sc) {
  var current = mappings[sc].action || 'direct';
  var opts = ['direct','mqtt','disabled'].map(function(a) {
    return '<option value="' + a + '"' + (a === current ? ' selected' : '') + '>' + a + '</option>';
  }).join('');
  el.outerHTML = '<select class="edit-select" onchange="saveAction(this,\'' + sc + '\')" onblur="renderMappings()">' + opts + '</select>';
  el.parentElement.querySelector('select').focus();
}

function saveAction(sel, sc) {
  mappings[sc].action = sel.value;
  saveMappings(function() { renderMappings(); });
}

// ===================== SETTINGS =====================

function loadSettings() {
  fetch('/api/settings')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      document.getElementById('setDebounce').value = s.debounce_ms || 100;
      document.getElementById('setHoldThrottle').value = s.hold_throttle_ms || 200;
      document.getElementById('setRetryCount').value = s.retry_count || 3;
      document.getElementById('setRetryDelay').value = Math.round((s.retry_delay || 1.0) * 1000);
      document.getElementById('setLogLevel').value = s.log_level || 'INFO';
      document.getElementById('setHaUrl').value = s.ha_url || '';
      document.getElementById('setHaToken').value = s.ha_token || '';
    });
}

function saveSettings() {
  var data = {
    debounce_ms: parseInt(document.getElementById('setDebounce').value) || 100,
    hold_throttle_ms: parseInt(document.getElementById('setHoldThrottle').value) || 200,
    retry_count: parseInt(document.getElementById('setRetryCount').value) || 3,
    retry_delay: (parseInt(document.getElementById('setRetryDelay').value) || 1000) / 1000,
    log_level: document.getElementById('setLogLevel').value || 'INFO',
    ha_url: document.getElementById('setHaUrl').value.trim(),
    ha_token: document.getElementById('setHaToken').value.trim(),
  };
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) toast('Settings saved', 'success');
      else toast('Save failed', 'error');
    })
    .catch(function() { toast('Save failed', 'error'); });
}

function scanHA() {
  var el = document.getElementById('haResults');
  el.innerHTML = '<span style="color:var(--text-dim)">Scanning...</span>';
  // Save settings first to ensure URL/token are stored
  saveSettings();
  setTimeout(function() {
    fetch('/api/ha-scan', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.ok) { el.innerHTML = '<span style="color:var(--red)">' + d.error + '</span>'; return; }
        if (!d.automations.length) { el.innerHTML = '<span style="color:var(--text-dim)">No automations found referencing ir-bridge</span>'; return; }
        el.innerHTML = d.automations.map(function(a) {
          var name = a.alias || a.name || a.entity_id || a.id;
          var state = a.state ? ' <span class="ha-state">[' + a.state + ']</span>' : '';
          return '<div class="ha-result"><span class="ha-name">' + name + '</span>' + state + '</div>';
        }).join('');
        toast(d.automations.length + ' automation(s) found', 'success');
      })
      .catch(function(e) { el.innerHTML = '<span style="color:var(--red)">Scan failed</span>'; });
  }, 500);
}

// ===================== ADD / DUPE / LAST INPUT =====================

function addMapping() {
  var sc = document.getElementById('addScancode').value.trim().toLowerCase();
  var cmd = document.getElementById('addCommand').value.trim();
  var ircc = document.getElementById('addIrcc').value.trim();
  var group = document.getElementById('addGroup').value;
  var db = document.getElementById('addDebounce').value.trim();
  var action = document.getElementById('addAction').value;
  var notes = document.getElementById('addNotes').value.trim();

  if (!sc || !cmd || !ircc) { toast('All fields required', 'error'); return; }

  var entry = { command: cmd, ircc: ircc, group: group, action: action };
  if (db && parseInt(db) > 0) entry.debounce_ms = parseInt(db);
  if (notes) entry.notes = notes;

  if (mappings[sc]) {
    confirm('Scancode ' + sc + ' already mapped to "' + mappings[sc].command + '". Overwrite?', function() {
      mappings[sc] = entry;
      saveMappings(function() { clearAddForm(); renderMappings(); });
    });
    return;
  }

  mappings[sc] = entry;
  saveMappings(function() { clearAddForm(); renderMappings(); });
}

function clearAddForm() {
  document.getElementById('addScancode').value = '';
  document.getElementById('addCommand').value = '';
  document.getElementById('addIrcc').value = '';
  document.getElementById('addDebounce').value = '';
  document.getElementById('addNotes').value = '';
  document.getElementById('dupeWarn').style.display = 'none';
}

function checkDupe() {
  var sc = document.getElementById('addScancode').value.trim().toLowerCase();
  var warn = document.getElementById('dupeWarn');
  if (sc && mappings[sc]) {
    warn.textContent = 'Duplicate: ' + sc + ' → "' + mappings[sc].command + '" (will overwrite on add)';
    warn.style.display = '';
  } else {
    warn.style.display = 'none';
  }
}

function useLastInput() {
  if (lastUnmappedScancode) {
    document.getElementById('addScancode').value = lastUnmappedScancode;
    checkDupe();
    document.getElementById('addCommand').focus();
  }
}

function updateLastButton() {
  var btn = document.getElementById('btnLastInput');
  if (lastUnmappedScancode) {
    btn.style.display = '';
    btn.title = 'Use ' + lastUnmappedScancode;
  }
}

// ===================== ADOPT FROM FEED =====================

function adoptFromFeed(scancode) {
  document.getElementById('addScancode').value = scancode;
  checkDupe();
  document.getElementById('addCommand').focus();
  // Scroll to add row
  var table = document.querySelector('.table-scroll');
  table.scrollTop = table.scrollHeight;
}

// ===================== DELETE CONFIRM =====================

function confirmDelete(sc) {
  var cmd = mappings[sc] ? mappings[sc].command : sc;
  confirm('Delete mapping "' + cmd + '" (' + sc + ')?', function() {
    delete mappings[sc];
    saveMappings(function() { renderMappings(); });
  });
}

function confirm(msg, onYes) {
  var c = document.getElementById('confirmContainer');
  c.innerHTML = '<div class="confirm-overlay" onclick="closeConfirm()">'
    + '<div class="confirm-box" onclick="event.stopPropagation()">'
    + '<p>' + msg + '</p>'
    + '<div class="btn-group"><button class="btn" onclick="closeConfirm()">Cancel</button>'
    + '<button class="btn btn-delete" id="confirmYes">Delete</button></div>'
    + '</div></div>';
  document.getElementById('confirmYes').onclick = function() { closeConfirm(); onYes(); };
}

function closeConfirm() {
  document.getElementById('confirmContainer').innerHTML = '';
}

// ===================== TEST =====================

function testMapping(sc) {
  var m = mappings[sc];
  if (!m) return;
  fetch('/api/test', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ircc: m.ircc, command: m.command })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      toast(d.ok ? 'Sent: ' + m.command : 'Failed: ' + m.command, d.ok ? 'success' : 'error');
    })
    .catch(function() { toast('Request failed', 'error'); });
}

// ===================== SAVE =====================

function saveMappings(cb) {
  fetch('/api/mappings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(mappings)
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) { toast('Saved', 'success'); if (cb) cb(); }
      else { toast('Save failed: ' + d.error, 'error'); }
    })
    .catch(function() { toast('Save failed', 'error'); });
}

// ===================== DEBUG TOGGLE =====================

function toggleDebug() {
  debugMode = !debugMode;
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ debug_mode: debugMode })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        document.getElementById('mqttTopic').textContent = d.mqtt_topic;
        toast(debugMode ? 'Debug mode ON' : 'Production mode', debugMode ? 'error' : 'success');
      }
    })
    .catch(function() { toast('Toggle failed', 'error'); });
  updateDebugUI();
}

function updateDebugUI() {
  var track = document.getElementById('debugToggle');
  var lp = document.getElementById('labelProd');
  var ld = document.getElementById('labelDebug');
  if (debugMode) {
    track.classList.add('active');
    lp.style.opacity = '0.3'; ld.style.opacity = '1';
  } else {
    track.classList.remove('active');
    lp.style.opacity = '1'; ld.style.opacity = '0.3';
  }
}

// ===================== LIVE FEED =====================

function pollEvents() {
  var url = '/api/events';
  if (lastPollTs) url += '?last_ts=' + encodeURIComponent(lastPollTs);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(events) {
      if (!events.length) return;
      var feed = document.getElementById('liveFeed');
      var empty = feed.querySelector('.feed-empty');
      if (empty) empty.remove();

      events.forEach(function(ev) {
        lastPollTs = ev.timestamp;
        var t = ev.timestamp.split('T')[1].split('.')[0];
        var sc = ev.key.key_code_hex;
        var cmd = ev.key.command || 'unmapped';
        var mapped = ev.key.mapped;

        // Track last unmapped scancode
        if (!mapped) {
          lastUnmappedScancode = sc;
          updateLastButton();
        }

        // Highlight active row in table
        if (mapped) highlightRow(sc);

        var el = document.createElement('div');
        el.className = 'feed-item';

        var leftHtml = '<span class="feed-time">' + t + '</span>'
          + '<span class="feed-code">' + sc + '</span>';

        if (mapped) {
          leftHtml += '<span class="feed-command" onclick="scrollToMapping(\'' + sc + '\')">' + cmd + '</span>';
        } else {
          leftHtml += '<span class="feed-command unmapped">' + cmd + '</span>';
        }

        var rightHtml = '';
        if (!mapped) {
          rightHtml += '<button class="btn btn-adopt" onclick="adoptFromFeed(\'' + sc + '\')" title="Add mapping for this scancode">+</button>';
        }
        rightHtml += '<span class="feed-dot ' + (mapped ? 'mapped' : 'unmapped') + '"></span>';

        el.innerHTML = '<div class="feed-left">' + leftHtml + '</div><div class="feed-right">' + rightHtml + '</div>';
        feed.insertBefore(el, feed.firstChild);

        while (feed.children.length > MAX_FEED) feed.removeChild(feed.lastChild);
      });
    })
    .catch(function(){});
}

// ===================== HIGHLIGHT & SCROLL =====================

function highlightRow(sc) {
  var id = 'row-' + sc.replace('0x','');
  var row = document.getElementById(id);
  if (!row) return;
  row.classList.remove('active-pulse');
  void row.offsetWidth; // force reflow
  row.classList.add('active-pulse');
  setTimeout(function() { row.classList.remove('active-pulse'); }, 1500);
}

function scrollToMapping(sc) {
  var id = 'row-' + sc.replace('0x','');
  var row = document.getElementById(id);
  if (!row) return;
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  highlightRow(sc);
}

// ===================== STATUS =====================

function pollStatus() {
  fetch('/api/status')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      document.getElementById('statKeys').textContent = s.keys_pressed || 0;
      document.getElementById('statSent').textContent = s.commands_sent || 0;
      document.getElementById('statErrors').textContent = s.errors || 0;
      if (s.started_at) {
        var ms = Date.now() - new Date(s.started_at).getTime();
        var h = Math.floor(ms / 3600000);
        var m = Math.floor((ms % 3600000) / 60000);
        document.getElementById('statUptime').textContent = h + 'h ' + m + 'm';
      }
    })
    .catch(function(){});
}

// ===================== TOAST =====================

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  setTimeout(function() { el.className = 'toast'; }, 2500);
}

function clearFeed() {
  fetch('/api/events', { method: 'DELETE' })
    .then(function() {
      feedItems = [];
      lastPollTs = '';
      document.getElementById('liveFeed').innerHTML = '<div class="feed-empty">Waiting for key events...</div>';
    });
}

init();
</script>
</body>
</html>
